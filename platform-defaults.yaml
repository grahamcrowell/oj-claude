# platform-defaults.yaml
# Curated offline fallback representing the current Claude Code platform.
# Used by Step 00 when no platform-declaration.yaml is present and introspection
# is unavailable (defaults mode). Also used as the fallback source for fields
# that introspection cannot observe (hooks, constraints, cost ratios, other models' details).
#
# VERSION: Update `version` when the platform roster changes significantly
# (new model generation, new tools, context window changes, cost ratio shifts).
# The version field enables staleness detection in Step 00.
#
# NAMING: The platform tool "Agent" is referred to as "Task tool" in spec vocabulary
# (D08–D80). See M16-derivation-architecture.md §3 for the mapping note.
#
# MODEL IDs: api_id strings are the values Claude Code accepts for the model
# parameter / settings.json. `claude-opus-4-8[1m]` is the 1M-context alias form
# of claude-opus-4-8 (short alias: `opus[1m]`); `claude-fable-5` is Anthropic's
# canonical identifier for Claude Fable 5 (short alias: `fable`).
#
# See: M16-derivation-architecture.md §3 for schema definition and field semantics.

version: "2.0.0"
version_date: "2026-07-08"
description: "Claude Code platform defaults — claude-fable-5 / claude-opus-4-8[1m] generation, xhigh effort"

platform:
  tools:
    # --- Agent spawning (platform name: "Agent"; spec vocabulary: "Task tool") ---
    - name: "Agent"
      available: true
      parameters: ["description", "model", "plan_mode_required", "subagent_type"]

    # --- Team coordination ---
    - name: "TeamCreate"
      available: true
      parameters: ["team_name", "description"]
    - name: "TeamDelete"
      available: true
      parameters: ["team_id"]
    - name: "SendMessage"
      available: true
      parameters: ["to", "message", "summary"]

    # --- Task management ---
    - name: "TaskCreate"
      available: true
      parameters: ["subject", "description", "activeForm", "metadata"]
    - name: "TaskUpdate"
      available: true
      parameters: ["taskId", "status", "owner", "description", "subject", "activeForm", "metadata", "addBlocks", "addBlockedBy"]
    - name: "TaskList"
      available: true
      parameters: []
    - name: "TaskGet"
      available: true
      parameters: ["taskId"]

    # --- File operations ---
    - name: "Read"
      available: true
      parameters: ["file_path", "limit", "offset", "pages"]
    - name: "Edit"
      available: true
      parameters: ["file_path", "old_string", "new_string", "replace_all"]
    - name: "Write"
      available: true
      parameters: ["file_path", "content"]
    - name: "NotebookEdit"
      available: true
      parameters: ["notebook_path", "new_source", "cell_id", "cell_type", "edit_mode"]

    # --- Shell and search ---
    - name: "Bash"
      available: true
      parameters: ["command", "description", "timeout", "run_in_background", "dangerouslyDisableSandbox"]
    - name: "Glob"
      available: true
      parameters: ["pattern", "path"]
    - name: "Grep"
      available: true
      parameters: ["pattern", "path", "glob", "type", "output_mode", "context", "head_limit", "offset", "multiline", "-A", "-B", "-C", "-i", "-n"]

    # --- Meta/discovery ---
    - name: "Skill"
      available: true
      parameters: ["skill", "args"]
    - name: "ToolSearch"
      available: true
      parameters: ["query", "max_results"]

    # --- Web ---
    - name: "WebFetch"
      available: true
      parameters: ["url", "prompt"]
    - name: "WebSearch"
      available: true
      parameters: ["query", "allowed_domains", "blocked_domains"]

    # --- Git worktrees ---
    - name: "EnterWorktree"
      available: true
      parameters: ["name"]
    - name: "ExitWorktree"
      available: true
      parameters: ["action", "discard_changes"]

    # --- Scheduling (session-scoped) ---
    - name: "CronCreate"
      available: true
      parameters: ["cron", "prompt", "recurring"]
    - name: "CronDelete"
      available: true
      parameters: ["id"]
    - name: "CronList"
      available: true
      parameters: []

    # --- User interaction (non-team context only) ---
    - name: "AskUserQuestion"
      available: conditional   # available in direct sessions; not available in team sub-agent context
      parameters: ["questions", "answers", "annotations", "metadata"]  # confirmed: ToolSearch schema (2026-04-08); primary param is "questions" (array of question objects)

  models:
    # Symbolic id: used in derivation chains and human-readable references
    # api_id: actual string for Claude Code model parameter and settings.json
    # cost_ratio: relative input token cost, opus[1m] = 1.0 baseline
    #   (Opus 4.8 $5/MTok input vs Fable 5 $10/MTok input)
    # effort: target effort for spawns on this model (applied session-level;
    #   the Task tool exposes no per-spawn effort knob — see CONDUCTOR.md § Effort)
    - id: "opus[1m]"
      api_id: "claude-opus-4-8[1m]"   # Claude Code 1M-context alias of claude-opus-4-8
      tier: "implementation"          # absorbs the former routine (haiku) and implementation (sonnet) tiers
      context_window: 1000000
      max_output_tokens: 128000
      cost_ratio: 1.0
      effort: "xhigh"
    - id: "fable"
      api_id: "claude-fable-5"
      tier: "reasoning"
      context_window: 1000000
      max_output_tokens: 128000
      cost_ratio: 2.0
      effort: "xhigh"

  hooks:
    - point: "SubagentStart"
      capabilities:
        - "modify_prompt"
        - "add_context"
      matchers:
        - "general-purpose"   # fires for general-purpose agents only (not Bash/Explore/Plan)
    - point: "SessionStart"
      capabilities:
        - "run_command"
      matchers: []            # no agent-type filter; fires for all sessions

  constraints:
    max_concurrent_agents: 5
    # "configured" = tunable recommendation; "hard" = platform-enforced ceiling
    max_concurrent_agents_type: "configured"
